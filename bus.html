<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Ticket Booking | Ticket Shop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>?? Ticket Shop</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="tour.html">Tour Packages</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="container">
    <h2>Bus Ticket Booking Request</h2>
    <br>

    <form id="bookingForm">
        <input type="text" id="from" placeholder="From District" required><br><br>

        <input type="text" id="to" placeholder="To District" required><br><br>

        <input type="date" id="date" required><br><br>

        <input type="text" id="name" placeholder="Your Name" required><br><br>

        <input type="tel" id="phone" placeholder="Mobile Number" required><br><br>

        <button type="submit" class="btn">Send Booking via WhatsApp</button>
    </form>
</section>

<footer>
    <p>© 2026 Ticket Shop | Phone: 01721136794</p>
</footer>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e){
    e.preventDefault();

    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;
    let date = document.getElementById("date").value;
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    let message =
`?? Ticket Shop Booking Request

Name: ${name}
Phone: ${phone}
From: ${from}
To: ${to}
Journey Date: ${date}`;

    let url = "https://wa.me/8801721136794?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
});
</script>

</body>
</html>
